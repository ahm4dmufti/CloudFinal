name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Shared values — these match your Terraform resource names.
env:
  ACR_NAME: cloudscaleahmadacr
  ACR_LOGIN_SERVER: cloudscaleahmadacr.azurecr.io
  IMAGE_NAME: cloudscale-app
  RESOURCE_GROUP: rg-cloudscale-ahmad
  CLUSTER_NAME: aks-cloudscale-ahmad

jobs:
  # JOB 1 — Build the image and test it. Runs on EVERY push.
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Test the /health endpoint
        run: |
          docker run -d -p 8080:8080 --name testapp $IMAGE_NAME:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:8080/health
          docker rm -f testapp

  # JOB 2 — Push the image to ACR. Only on push to main.
  push-to-acr:
    name: Push to ACR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push image to ACR
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} .
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

  # JOB 3 — Deploy to AKS. Only on main, BEHIND the manual approval gate.
  deploy-to-aks:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: push-to-acr
    if: github.ref == 'refs/heads/main'
    environment: production       # <-- this line triggers the approval gate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group $RESOURCE_GROUP --name $CLUSTER_NAME --admin --overwrite-existing

      - name: Insert the real image into the manifest
        run: |
          sed -i "s|cloudscaleahmadacr.azurecr.io/cloudscale-app:v1|$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/cloudscale-app